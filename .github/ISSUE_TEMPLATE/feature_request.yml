name: Feature request
description: Suggest a focused improvement for JobPilot AI.
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or contributor problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version of the change.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional tradeoffs or other approaches.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Applications
        - Resume analysis
        - Interview prep
        - Settings/local data
        - Documentation
        - Developer tooling
        - Other
    validations:
      required: true
